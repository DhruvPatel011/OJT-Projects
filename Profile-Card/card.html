<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Profile Card</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
}

/* Card */
.profile-card{
    width:360px;
    background:#ffffff;
    border-radius:30px;
    overflow:hidden;
    box-shadow:
        0 20px 50px rgba(37, 99, 235, 0.15),
        0 8px 20px rgba(0, 0, 0, 0.08);
    position:relative;
    transition:0.4s ease;
}

.profile-card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:
        0 30px 70px rgba(37, 99, 235, 0.2),
        0 12px 30px rgba(0, 0, 0, 0.12);
}

/* Top Gradient Section */
.card-top{
    height:150px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    position:relative;
}

/* Avatar */
.avatar{
    position:absolute;
    left:50%;
    bottom:-60px;
    transform:translateX(-50%);
    width:130px;
    height:130px;
    border-radius:50%;
    border:6px solid #ffffff;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    background:#fff;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}
/* Content */
.card-content{
    padding:80px 30px 30px;
    text-align:center;
}

.card-content h2{
    font-size:28px;
    font-weight:700;
    color:#1f2937;
}

.card-content h2 span{
    color:#2563eb;
}

.role{
    display:inline-block;
    margin-top:8px;
    padding:6px 16px;
    border-radius:30px;
    background:linear-gradient(135deg, #eff6ff, #dbeafe);
    color:#2563eb;
    font-size:14px;
    font-weight:600;
}

/* Description */
.description{
    margin-top:15px;
    color:#6b7280;
    font-size:14px;
    line-height:1.7;
}

/* Social Icons */
.social-icons{
    margin-top:22px;
    display:flex;
    justify-content:center;
    gap:14px;
}

.social-icons a{
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    text-decoration:none;
    font-size:18px;
    transition:0.3s ease;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.social-icons a:hover{
    transform:translateY(-5px) scale(1.1);
}

.facebook{ background:#1877f2; }
.youtube{ background:#ff0000; }
.github{ background:#111827; }
.linkedin{background-color: #1877f2;}

/* Buttons */
.buttons{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.btn{
    padding:12px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:0.3s ease;
}

.btn-primary{
    background:linear-gradient(135deg, #2563eb, #7c3aed);
    color:#fff;
    box-shadow:0 10px 20px rgba(37, 99, 235, 0.25);
}

.btn-primary a{
    text-decoration: none;
    color: white;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 25px rgba(37, 99, 235, 0.35);
}

.btn-outline{
    background:#fff;
    color:#2563eb;
    border:2px solid #dbeafe;
}

.btn-outline:hover{
    background:#eff6ff;
    transform:translateY(-3px);
}

/* Stats */
.stats{
    margin-top:28px;
    padding-top:22px;
    border-top:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
}

.stat{
    flex:1;
    text-align:center;
}

.stat i{
    color:#2563eb;
    margin-bottom:6px;
    display:block;
    font-size:18px;
}

.stat h4{
    font-size:18px;
    font-weight:700;
    color:#111827;
}

.stat p{
    font-size:12px;
    color:#6b7280;
    margin-top:2px;
}

/* Responsive */
@media (max-width: 400px){
    .profile-card{
        width:90%;
    }

    .buttons{
        flex-direction:column;
    }

    .stats{
        gap:10px;
    }
}
</style>
</head>
<body>

<div class="profile-card">
    <div class="card-top">
        <div class="circle"></div>
            <div class="avatar">
                <!-- Replace this image with your own -->
                <img src="../imgs/mypfp.jpeg" alt="Profile Photo">
        </div>
    </div>

    <div class="card-content">
        <h2>Dhruv <span>Patel</span></h2>
        <div class="role">Full Stack Developer & UI Designer</div>

        <p class="description">
            Passionate about web development, AI tools, and creating beautiful,
            interactive user experiences.
        </p>

        <div class="social-icons">
            <a href="https://discord.gg/3f8T4txq" class="facebook"><i class="fab fa-discord"></i></a>
            <a href="https://www.youtube.com/@bauuaa-badmosh" class="youtube"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/DHRUVPATEL1111" class="github"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/dhruv-patel-129b08325/" class="linkedin"><i class="fab fa-linkedin"></i></a>
        </div>

        <div class="buttons">
            <button class="btn btn-primary"><a href="mailto:dhruvpatel5471@gmail.com?subject=Contact&body=Hello Dhruv,">Contact</a></button>
            <button class="btn btn-outline">Message</button>
        </div>
    </div>
</div>

</body>
</html>q
